<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Now Playing UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="player" class="now-playing idle">
    <img
      class="album-art"
      src=""
      alt="Album art"
      id="album-art"
    />

    <div class="meta">
      <a id="track-link" href="#" target="_blank"><span class="track" id="track"></span></a>
      <div class="artist" id="artist"></div>

      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text" id="status-text"></span>
      </div>
    </div>

    <div class="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>


</body>
<script src="script.js"></script>
</html>
